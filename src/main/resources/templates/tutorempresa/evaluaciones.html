<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <title>Evaluar Alumno</title>
</head>
<body>
<nav>
    <span class="marca">Gestión de Prácticas</span>
    <div>
        <a th:href="@{/tutorempresa/panel}">Panel</a>
        <a th:href="@{/tutorempresa/horas}">Validar Horas</a>
        <a th:href="@{/tutorempresa/evaluaciones}">Evaluar Alumno</a>
        <a th:href="@{/tutorempresa/documentos}">Documentos</a>
        <a th:href="@{/logout}">Cerrar sesión</a>
    </div>
</nav>
<div class="contenido">
    <h1 class="panel-titulo">Evaluar Alumno</h1>

    <p th:if="${practicas == null or #lists.isEmpty(practicas)}" class="bienvenida">
        No tienes ninguna práctica asignada.
    </p>

    <table th:if="${practicas != null and !#lists.isEmpty(practicas)}">
        <thead>
        <tr>
            <th>Alumno</th>
            <th>Empresa</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${practicas}">
            <td th:text="${p.alumno.nombre}"></td>
            <td th:text="${p.empresa.nombre}"></td>
            <td th:text="${p.estado}"></td>
            <td>
                <a th:href="@{/tutorempresa/evaluaciones/{id}(id=${p.id})}"
                   class="btn-panel" style="padding:6px 12px; font-size:12px;">
                    Ver evaluaciones
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
