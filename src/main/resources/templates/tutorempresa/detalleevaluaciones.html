<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <title>Evaluar Alumno</title>
</head>
<body>
<nav>
    <span class="marca">Gestión de Prácticas</span>
    <div>
        <a th:href="@{/tutorempresa/panel}">Panel</a>
        <a th:href="@{/tutorempresa/horas}">Validar Horas</a>
        <a th:href="@{/tutorempresa/evaluaciones}">Evaluar Alumno</a>
        <a th:href="@{/tutorempresa/documentos}">Documentos</a>
        <a th:href="@{/logout}">Cerrar sesión</a>
    </div>
</nav>
<div class="contenido">
    <h1 class="panel-titulo">Evaluaciones de <span th:text="${practica.alumno.nombre}"></span></h1>

    <div style="margin-bottom:20px;">
        <a th:href="@{/tutorempresa/evaluaciones}" class="btn-panel" style="padding:8px 16px;">Volver</a>
    </div>

    <div class="formulario">
        <form th:action="@{/tutorempresa/evaluaciones/guardar}" method="post">
            <input type="hidden" name="practicaId" th:value="${practica.id}"/>
            <input type="hidden" name="tutorId" th:value="${usuario.id}"/>
            <div class="formulario-fila">
                <input type="number" name="nota" placeholder="Nota (0-10)" min="0" max="10" step="0.1" required/>
                <input type="text" name="comentarios" placeholder="Comentarios" required/>
                <button type="submit" class="btn-panel btn-verde">Guardar evaluación</button>
            </div>
        </form>
    </div>

    <table th:if="${evaluaciones != null and !#lists.isEmpty(evaluaciones)}">
        <thead>
        <tr>
            <th>Nota</th>
            <th>Comentarios</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="e : ${evaluaciones}">
            <td th:text="${e.nota}"></td>
            <td th:text="${e.comentarios}"></td>
        </tr>
        </tbody>
    </table>
    <p th:if="${evaluaciones == null or #lists.isEmpty(evaluaciones)}" class="bienvenida">
        No hay evaluaciones registradas aún.
    </p>
</div>
</body>
</html>
